# Default configuration for analyze_bell.py
# These values match the hardcoded fallbacks. They are loaded automatically
# when no analyze_bell.ini is found in the working directory.

[analysis]
attack_skip_ms = 100.0
min_freq = 50.0
max_freq = 8000.0
prominence = 0.005
distance = 20
smoothing_window = 11
fft_size = 16384
hop_size = 2048
peak_count =

[visualization]
spec_nperseg = 4096
spec_noverlap = 3072
spec_nfft = 4096
spectrum_floor = -50.0
spec_floor = -144.0
n_labels = 7

[output]
format = csv
